# src/global_agent_system/crews/daily_socials_crew/config/tasks.yaml

  research_ai_trends:
  description: >
    Search r/singularity, r/accelerate, Hacker News, and the bleeding-edge AI spaces on X/Twitter
    for the absolute biggest, most paradigm-shifting AI news of the past 24 hours. You are hunting
    for major model drops, timeline accelerations, technical breakthroughs, and the major cultural
    conversations and debates happening within these communities. Your primary goal is to gather
    the raw data, facts, and prevailing community sentiments. Your job is simply to prep the most salient data so the writer can apply their rubric later.
   
    CRITICAL INSTRUCTION: You MUST use the FileReadTool to read the 'knowledge/daily_socials_knowledge/ai_researcher_rubric.txt' file. You must strictly follow the formatting rules provided in that document.
   
    TOOL INSTRUCTION: You must use the RSSFeedTool alongside the SerperDevTool and ScrapeWebsiteTool to gather the most up-to-date and relevant grassroots discussions.
    
    RSS FEED URLS TO USE:
    - https://www.technologyreview.com/feed/
    - https://www.wired.com/feed/rss
    - https://techcrunch.com/category/artificial-intelligence/feed/
    - https://raw.githubusercontent.com/Olshansk/rss-feeds/refs/heads/main/feeds/feed_openai_research.xml
    - https://raw.githubusercontent.com/leontloveless/ai-rss-feeds/main/feeds/deepmind-blog.xml
    - https://raw.githubusercontent.com/Olshansk/rss-feeds/refs/heads/main/feeds/feed_anthropic.xml
    - https://hnrss.org/frontpage?link=comments
    - https://www.reddit.com/r/singularity/top/.rss?t=day
    - https://www.reddit.com/r/accelerate/top/.rss?t=day
    - https://www.reddit.com/r/futurology/top/.rss?t=day
    - https://www.reddit.com/r/transhumanism/top/.rss?t=day
    - https://www.reddit.com/r/agi/top/.rss?t=day
    - https://www.reddit.com/r/LocalLLaMA/top/.rss?t=day
    - https://www.reddit.com/r/artificial/top/.rss?t=day
    
    STEP-BY-STEP SEARCH STRATEGY:
    1. Check the provided RSS feeds above using the RSSFeedTool to identify 3-4 recurring themes or grassroots hype.
    2. Use the news_search_tool to find reputable articles corroborating those themes from elite tech journals.
    3. Use the ScrapeWebsiteTool to read the full text of the most promising URLs to verify factual accuracy before finalizing the summary.
    4. For X/Twitter news, search for reputable news articles *about* what key figures tweeted rather than trying to scrape Twitter directly.

    CRITICAL SEARCH INSTRUCTION: When using the search tool, DO NOT use conversational sentences or questions. Use strict, simple keywords.
    Good Example: 'Sam Altman AI news' or 'Anthropic new model release'
    Bad Example: 'What did Sam Altman and Elon Musk say about AI today?'
  expected_output: >
    A list of the top 3 trending philosophical points of interest or technological breakthroughs, economic impacts, popular discourse, etc.
    Importantly, you must include all URL sources.
  agent: ai_researcher

research_culture_politics:
  description: >
    Monitor r/politics, AP, and Reuters for trending U.S. news and global events that directly
    concern or impact the U.S. Identify stories that deserve commentary, slightly prioritizing
    those that intersect with Christian Nationalism, GenAI, or major cultural shifts.
   
    CRITICAL INSTRUCTION: You MUST use the FileReadTool to read the 'knowledge/daily_socials_knowledge/culture_researcher_rubric.txt' file. You must strictly follow the formatting rules provided in that document.
   
    TOOL INSTRUCTION: You must use the RSSFeedTool for any Reddit sources (like r/politics), alongside the SerperDevTool and ScrapeWebsiteTool to ensure the data gathered is real-time, accurate, and properly sourced with URLs.
    CRITICAL SEARCH INSTRUCTION: When using the search tool, DO NOT use conversational sentences or questions. Use strict, simple keywords.
    Good Example: 'Iran news today' or 'Donald Trump today'
    Bad Example: 'What did Donald Trump say about Iran today?'
  expected_output: >
    A summary of 5 high-salience news stories with primary source links
    and 2 paragraphs of explanation of the current public sentiment. Importantly, you must include all URL sources.
  agent: culture_politics_researcher

research_religion_nationalism:
  description: >
    Gather factual data on Christian Nationalism and its antagonists. Focus specifically
    on powerful political figures and influencers who resonate with Christian Nationalism
    (e.g., Mike Johnson, Marjorie Taylor Greene, Lauren Boebert, Michael Flynn, and
    leaders within the New Apostolic Reformation). Map their activities and the counter-activities
    from secular humanists, interfaith coalitions, legal watchdogs, and scientific rationalists.
    Maintain strict neutrality.
    
    CRITICAL INSTRUCTION: You MUST use the FileReadTool to read the 'knowledge/daily_socials_knowledge/religion_researcher_rubric.txt' file. You must strictly follow the formatting rules provided in that document.
    
    TOOL INSTRUCTION: You MUST prioritize using the RSSFeedTool to check the direct news feeds first. If you need more stories to reach your 5-item quota, utilize the SerperDevTool and ScrapeWebsiteTool to ensure the data gathered is real-time, accurate, and properly sourced with URLs.
    CRITICAL SEARCH INSTRUCTION: When using the search tool, DO NOT use conversational sentences or questions. Use strict, simple keywords.
    Good Example: 'Marjorie Taylor Greene Christian Nationalism' or 'OpenAI new model release'
    Bad Example: 'What did Marjorie Taylor Greene say about Christian Nationalism today?'
  expected_output: >
    A factual report detailing 5 key developments in religious power
    dynamics and 2 paragraphs of specific responses from antagonist groups. Importantly, you must include all URL sources.
  agent: religion_researcher

clean_ai_data:
  description: >
    Review findings from the AI researcher. Remove duplicates, verify links,
    and organize the data into a strict JSON format for the AI writer.
    Identify the most 'salient' stories from the AI category.
   
    You MUST format your output as a JSON array of objects using exactly this template:
    [
      {
        "headline": "The main headline or topic",
        "facts": "A summary of the core facts",
        "context": "2 paragraphs of context explaining the significance",
        "urls": ["https://source-url-1.com", "https://source-url-2.com"]
      }
    ]
   
    CRITICAL INSTRUCTION: You MUST use the FileReadTool to read the 'knowledge/daily_socials_knowledge/data_cleaner_rubric.txt' file. You must strictly follow the formatting rules provided in that document.
  expected_output: >
    A strictly formatted JSON array containing the most relevant facts, 2 paragraphs of context for each story, and all preserved source URLs for the AI category.
  agent: data_cleaner
  context:
    - research_ai_trends

