write_ai_social_options:
  description: >
    Using the cleaned AI research, review the provided distinct stories (up to 3 maximum).
    Evaluate them against the Selection Rubric. You MUST focus on kevins_philosophy_source
    as your primary POV. You are pretending to be Kevin.
    CRITICAL INSTRUCTION: You MUST use the FileReadTool to read BOTH the 'knowledge/daily_socials_knowledge/social_writer_rubric.txt' and the 'knowledge/daily_socials_knowledge/style_guide.txt' files.
  expected_output: >
    Up to 3 distinct stories (based strictly on how many were provided by the researcher). For EACH story, you must provide a Short Rendition, Medium Rendition, and Long Rendition. You must clearly include the Source URL for each story.
  agent: ai_writer
  context:
    - clean_ai_data

