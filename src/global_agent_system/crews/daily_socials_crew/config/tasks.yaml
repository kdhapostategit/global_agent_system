edit_and_select_final_options:
  description: >
    Review all drafts from the three writers. You will receive up to 3 AI stories, 3 Culture stories, and 3 Religion stories.
    Do NOT filter or delete any of these stories. You must process, polish, and output ALL stories provided to you.
    CRITICAL INSTRUCTION: You MUST use the FileReadTool to read BOTH the 'knowledge/daily_socials_knowledge/chief_editor_rubric.txt' and the 'knowledge/daily_socials_knowledge/style_guide.txt' files.
  expected_output: >
    A final formatted list containing all the stories provided to you. They MUST be numbered sequentially from ITEM 1 onwards. Every single ITEM must include its Source URL, followed by a Short Rendition, Medium Rendition, and Long Rendition.
  agent: chief_editor
  context:
    - write_ai_social_options
    - write_culture_social_options
    - write_religion_social_options
