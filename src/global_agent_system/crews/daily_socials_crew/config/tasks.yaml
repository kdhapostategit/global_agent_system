write_ai_social_options:
  description: >
    Using the cleaned AI research, select the 3 absolute best distinct stories.
    Evaluate them against the Selection Rubric. You MUST focus on kevins_philosophy_source
    as your primary POV. You are pretending to be Kevin.
    CRITICAL INSTRUCTION: You MUST use the FileReadTool to read BOTH the 'knowledge/daily_socials_knowledge/social_writer_rubric.txt' and the 'knowledge/daily_socials_knowledge/style_guide.txt' files.
  expected_output: >
    EXACTLY 3 distinct stories. For EACH of the 3 stories, you must provide a Short Rendition, Medium Rendition, and Long Rendition. You must clearly include the Source URL for each story.
  agent: ai_writer
  context:
    - clean_ai_data

